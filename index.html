<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Deal Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 { font-size: 36px; margin-bottom: 10px; }
        
        .main-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .input-group { display: flex; flex-direction: column; }
        
        .input-group label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 5px;
        }
        
        .input-group input {
            padding: 10px;
            border: 2px solid #e5e5e5;
            border-radius: 6px;
            font-size: 15px;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .analyze-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .analyze-btn:hover { transform: translateY(-2px); }
        
        .results {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e5e5e5;
            display: none;
        }
        
        .results.show { display: block; }
        
        .decision-badge {
            display: inline-block;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 15px;
        }
        
        .pursue { background: #4caf50; color: white; }
        .review { background: #ff9800; color: white; }
        .pass { background: #f44336; color: white; }
        
        .offer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        .offer-card {
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 3px solid;
        }
        
        .offer-card.opener { background: #e8f5e9; border-color: #4caf50; }
        .offer-card.target { background: #fff3e0; border-color: #ff9800; }
        .offer-card.walkaway { background: #ffebee; border-color: #f44336; }
        
        .offer-card h3 {
            font-size: 12px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 10px;
        }
        
        .offer-card .value {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 5px;
        }
        
        @media (max-width: 768px) {
            .input-grid, .offer-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 Real Estate Deal Analyzer</h1>
            <p>Simple • Fast • Conservative</p>
        </div>

        <div class="main-card">
            <h2>Enter Property Details</h2>
            
            <div class="input-grid">
                <div class="input-group">
                    <label>Seller Asking Price</label>
                    <input type="number" id="sellerAsk" value="35000">
                </div>
                <div class="input-group">
                    <label>Square Feet</label>
                    <input type="number" id="sqft" value="1200">
                </div>
                <div class="input-group">
                    <label>Full Baths</label>
                    <input type="number" id="baths" value="2">
                </div>
                <div class="input-group">
                    <label>Rehab Cost</label>
                    <input type="number" id="rehab" value="20000">
                </div>
            </div>

            <h3 style="margin-top: 20px;">Comps (Enter 2-3 Recent Sold Properties)</h3>
            
            <div style="margin-top: 10px;">
                <h4>Comp #1</h4>
                <div class="input-grid">
                    <div class="input-group">
                        <label>Sold Price</label>
                        <input type="number" id="comp1price" value="45000">
                    </div>
                    <div class="input-group">
                        <label>Square Feet</label>
                        <input type="number" id="comp1sqft" value="1150">
                    </div>
                </div>
            </div>

            <div style="margin-top: 15px;">
                <h4>Comp #2</h4>
                <div class="input-grid">
                    <div class="input-group">
                        <label>Sold Price</label>
                        <input type="number" id="comp2price" value="52000">
                    </div>
                    <div class="input-group">
                        <label>Square Feet</label>
                        <input type="number" id="comp2sqft" value="1280">
                    </div>
                </div>
            </div>

            <div style="margin-top: 15px;">
                <h4>Comp #3 (Optional)</h4>
                <div class="input-grid">
                    <div class="input-group">
                        <label>Sold Price</label>
                        <input type="number" id="comp3price" value="48000">
                    </div>
                    <div class="input-group">
                        <label>Square Feet</label>
                        <input type="number" id="comp3sqft" value="1200">
                    </div>
                </div>
            </div>

            <button class="analyze-btn" onclick="analyze()">📊 Analyze Deal</button>

            <div class="results" id="results"></div>
        </div>
    </div>

    <script>
        function analyze() {
            const sellerAsk = parseFloat(document.getElementById('sellerAsk').value);
            const sqft = parseFloat(document.getElementById('sqft').value);
            const baths = parseFloat(document.getElementById('baths').value);
            const rehab = parseFloat(document.getElementById('rehab').value);

            // Get comp data
            const comp1 = {
                price: parseFloat(document.getElementById('comp1price').value),
                sqft: parseFloat(document.getElementById('comp1sqft').value)
            };
            const comp2 = {
                price: parseFloat(document.getElementById('comp2price').value),
                sqft: parseFloat(document.getElementById('comp2sqft').value)
            };
            const comp3 = {
                price: parseFloat(document.getElementById('comp3price').value) || 0,
                sqft: parseFloat(document.getElementById('comp3sqft').value) || 0
            };

            // Simple ARV calculation (average comp price per sqft * subject sqft)
            let totalPricePerSqft = 0;
            let compCount = 0;

            if (comp1.price && comp1.sqft) {
                totalPricePerSqft += comp1.price / comp1.sqft;
                compCount++;
            }
            if (comp2.price && comp2.sqft) {
                totalPricePerSqft += comp2.price / comp2.sqft;
                compCount++;
            }
            if (comp3.price && comp3.sqft) {
                totalPricePerSqft += comp3.price / comp3.sqft;
                compCount++;
            }

            const avgPricePerSqft = totalPricePerSqft / compCount;
            const arv = Math.round(avgPricePerSqft * sqft);

            // MAO calculations
            const sellerCosts = arv * 0.06; // 6%
            const buyerCosts = arv * 0.03; // 3%
            const otherCosts = 2500 + 1500 + 1000; // holding + closing + financing

            const lowballMAO = Math.round((arv * 0.64) - rehab - buyerCosts - otherCosts);
            const targetMAO = Math.round((arv * 0.74) - rehab - buyerCosts - otherCosts);
            const maxMAO = Math.round((arv * 0.82) - rehab - buyerCosts - otherCosts);

            // Decision logic
            let decision = 'NEEDS REVIEW';
            let decisionClass = 'review';
            let reason = 'Additional analysis recommended';

            if (sellerAsk <= maxMAO) {
                decision = 'PURSUE';
                decisionClass = 'pursue';
                reason = 'Seller ask within acceptable range';
            } else if (sellerAsk > maxMAO * 1.5) {
                decision = 'PASS';
                decisionClass = 'pass';
                reason = 'Seller ask too far above maximum offer';
            }

            // Display results
            const html = `
                <div class="decision-badge ${decisionClass}">${decision}</div>
                <p style="font-size: 16px; color: #666; margin-bottom: 20px;">${reason}</p>

                <h3>Estimated ARV: $${arv.toLocaleString()}</h3>
                <p style="font-size: 14px; color: #666; margin-bottom: 20px;">
                    Based on ${compCount} comparable sales (Avg: $${avgPricePerSqft.toFixed(0)}/sqft)
                </p>

                <h3>Your Offer Structure:</h3>
                <div class="offer-grid">
                    <div class="offer-card opener">
                        <h3>Lowball</h3>
                        <div class="value">$${lowballMAO.toLocaleString()}</div>
                        <p>30% profit</p>
                    </div>
                    <div class="offer-card target">
                        <h3>Target</h3>
                        <div class="value">$${targetMAO.toLocaleString()}</div>
                        <p>20% profit</p>
                    </div>
                    <div class="offer-card walkaway">
                        <h3>Walk-Away</h3>
                        <div class="value">$${maxMAO.toLocaleString()}</div>
                        <p>12% minimum</p>
                    </div>
                </div>

                <div style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px;">
                    <p><strong>Seller Ask:</strong> $${sellerAsk.toLocaleString()}</p>
                    <p><strong>Gap to Max:</strong> $${(sellerAsk - maxMAO).toLocaleString()} 
                    (${(((sellerAsk - maxMAO) / sellerAsk) * 100).toFixed(0)}%)</p>
                </div>

                <div style="margin-top: 20px; padding: 15px; background: #e8f4f8; border-radius: 8px;">
                    <p style="font-size: 13px; color: #666;">
                        <strong>💡 Quick Tip:</strong> This is a simplified analysis. For full comp analysis with 
                        classification, confidence scoring, and strategy comparison, use the complete analyzer.
                    </p>
                </div>
            `;

            document.getElementById('results').innerHTML = html;
            document.getElementById('results').classList.add('show');
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }

        // Auto-analyze on load with demo data
        window.addEventListener('load', function() {
            setTimeout(analyze, 500);
        });
    </script>
</body>
</html>
